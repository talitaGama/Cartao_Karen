<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Cartão Dia das Mães</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

.cartao-wrapper {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  background: linear-gradient(135deg, #fff5f8 0%, #fffaf0 100%);
}

.heart-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 1.6rem 1.2rem;
  width: 100%;
  max-width: 380px;
  text-align: center;
  border: 1px solid #f0c8d8;
  position: relative;
  z-index: 10;
}

.card-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(1.8rem, 7vw, 2.4rem);
  color: #c47b5a;
  margin-bottom: 0.3rem;
}

.card-sub {
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  color: #c47b5a;
  letter-spacing: 1.5px;
  margin-bottom: 1.4rem;
}

.open-btn {
  background: linear-gradient(135deg, #d4a373, #c47b5a);
  color: white;
  border: none;
  padding: 16px;
  border-radius: 40px;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
}

.conteudo {
  display: none;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.conteudo.visivel {
  display: block;
  opacity: 1;
}

.mensagem {
  font-family: 'Montserrat', sans-serif;
  font-style: italic;
  font-size: 14px;
  color: #8a6a5a;
  line-height: 1.8;
  margin: 1rem 0;
  padding: 1rem;
  background: #fff8f3;
  border-radius: 12px;
  border-left: 3px solid #d4a373;
  text-align: left;
}

/* Carrossel */
.carrossel {
  position: relative;
  margin-top: 1rem;
  border-radius: 12px;
  overflow: hidden;
}

.carrossel-track {
  display: flex;
  transition: transform 0.45s ease;
}

.carrossel-track img {
  min-width: 100%;
  width: 100%;
  object-fit: contain;
}

.carr-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.8);
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 22px;
  color: #c47b5a;
}

.carr-btn.prev { left: 6px; }
.carr-btn.next { right: 6px; }

.carr-dots {
  display: flex;
  justify-content: center;
  gap: 7px;
  margin-top: 8px;
}

.carr-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #e0c4b4;
}

.carr-dot.ativo {
  background: #c47b5a;
  transform: scale(1.3);
}

/* YouTube */
.yt-section { margin-top: 1rem; }

.yt-label {
  font-family: 'Montserrat';
  font-size: 10px;
  color: #b08070;
  margin-bottom: 6px;
}

.yt-frame {
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 16/9;
}

.yt-frame iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.footer {
  font-family: 'Great Vibes';
  font-size: 1.5rem;
  color: #c47b5a;
  margin-top: 1.2rem;
}
</style>
</head>

<body>

<div class="cartao-wrapper">
<canvas class="heart-canvas" id="hCanvas"></canvas>

<div class="card">
<div class="card-title">Feliz Dia das Mães</div>
<div class="card-sub">com todo amor do mundo</div>

<button class="open-btn" onclick="abrirCartao()">Abrir com Amor</button>

<div class="conteudo" id="conteudo">

<div class="mensagem">
"Seu amor é o solo onde floresci, sua voz é a música que me guia. Obrigada por existir, mamãe."
</div>

<div class="carrossel" id="carrossel">
<div class="carrossel-track" id="track">
                <img src="https://i.postimg.cc/90pq0CqW/e1696dc6-3e57-4ffe-ac68-53411402cc5b.jpg" alt="Foto 1">
                <img src="https://i.postimg.cc/VLfCTr3J/9c408a1e-64ba-4da1-9ae0-3c3989a08d46.jpg" alt="Foto 2">
                <img src="https://i.postimg.cc/2S3Bjpjp/e05e0791-7d1a-4269-9714-ad77f7c6907a.jpg" alt="Foto 3">
</div>

<button class="carr-btn prev" onclick="mover(-1)">‹</button>
<button class="carr-btn next" onclick="mover(1)">›</button>
</div>

<div class="carr-dots" id="dots"></div>

<div class="yt-section">
<div class="yt-label">Uma música especial</div>
<div class="yt-frame">
<iframe src="https://www.youtube.com/embed/g8sfJKBYNMA?autoplay=1"></iframe>
</div>
</div>

<div class="footer">Com amor infinito 💖</div>

</div>
</div>
</div>

<script>
// Carrossel
let atual = 0;
const total = 3;
const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');

for (let i = 0; i < total; i++) {
  const d = document.createElement('div');
  d.className = 'carr-dot' + (i === 0 ? ' ativo' : '');
  d.onclick = () => irPara(i);
  dotsEl.appendChild(d);
}

function atualizarDots() {
  document.querySelectorAll('.carr-dot').forEach((d,i) => {
    d.className = 'carr-dot' + (i === atual ? ' ativo' : '');
  });
}

function irPara(idx) {
  atual = (idx + total) % total;
  track.style.transform = `translateX(-${atual * 100}%)`;
  atualizarDots();
}

function mover(dir) { irPara(atual + dir); }

let autoSlide = setInterval(() => mover(1), 4000);

const carr = document.getElementById('carrossel');
let touchStartX = 0;

carr.addEventListener('touchstart', e => {
  clearInterval(autoSlide);
  touchStartX = e.touches[0].clientX;
});

carr.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) mover(diff > 0 ? 1 : -1);
});

// Corações
const canvas = document.getElementById('hCanvas');
const ctx = canvas.getContext('2d');
const hearts = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function randomHeart() {
  return {
    x: Math.random() * canvas.width,
    y: -20,
    size: Math.random() * 18 + 8,
    speed: Math.random() * 1.2 + 0.4,
    opacity: Math.random() * 0.5 + 0.4,
    drift: (Math.random() - 0.5) * 0.8,
    angle: Math.random() * Math.PI * 2,
    color: ['#e8a0b4','#d4a373','#f4c2c2','#c47b5a'][Math.floor(Math.random()*4)]
  };
}

function drawHeart(hx, hy, size, color, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = color;
  ctx.beginPath();
  const s = size / 10;
  ctx.moveTo(hx, hy+s*2);
  ctx.bezierCurveTo(hx, hy, hx-s*5, hy, hx-s*5, hy+s*3);
  ctx.bezierCurveTo(hx-s*5, hy+s*7, hx, hy+s*9, hx, hy+s*10);
  ctx.bezierCurveTo(hx, hy+s*9, hx+s*5, hy+s*7, hx+s*5, hy+s*3);
  ctx.bezierCurveTo(hx+s*5, hy, hx, hy, hx, hy+s*2);
  ctx.fill();
  ctx.restore();
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (Math.random() < 0.08) hearts.push(randomHeart());

  for (let i = hearts.length-1; i >= 0; i--) {
    const h = hearts[i];
    h.y += h.speed;
    h.x += h.drift + Math.sin(h.angle)*0.5;
    h.angle += 0.04;
    h.opacity -= 0.003;

    drawHeart(h.x, h.y, h.size, h.color, Math.max(0, h.opacity));

    if (h.y > canvas.height+30 || h.opacity <= 0) {
      hearts.splice(i,1);
    }
  }

  requestAnimationFrame(loop);
}
loop();

function abrirCartao() {
  document.querySelector('.open-btn').style.display = 'none';
  const c = document.getElementById('conteudo');
  c.style.display = 'block';
  setTimeout(() => c.style.opacity = '1', 50);
}
</script>

</body>
</html>
